    label: "L1"
    type: input
  - id: l2
    label: "L2"
    type: input
  - id: l3
    label: "L3"
    type: input
  - id: l4
    label: "L4"
    type: input
  - id: l5
    label: "L5"
    type: input
  - id: r1
    label: "R1"
    type: output
  - id: r2
    label: "R2"
    type: output
  - id: r3
    label: "R3"
    type: output
  - id: r4
    label: "R4"
    type: output
  - id: r5
    label: "R5"
