    label: "0,0"
  - id: r0c1
    label: "0,1"
  - id: r0c2
    label: "0,2"
  - id: r0c3
    label: "0,3"
  - id: r1c0
    label: "1,0"
  - id: r1c1
    label: "1,1"
  - id: r1c2
    label: "1,2"
  - id: r1c3
    label: "1,3"
  - id: r2c0
    label: "2,0"
  - id: r2c1
    label: "2,1"
  - id: r2c2
    label: "2,2"
  - id: r2c3
    label: "2,3"
  - id: r3c0
    label: "3,0"
